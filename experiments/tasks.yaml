# Tasks chosen to give novelty room to vary -- open-ended, taste-bearing,
# no single right answer. A factual lookup or math problem would be a bad task here
# because every recipe converges to the same answer.

tasks:
  - id: git-conceptual-model
    prompt: |
      Redesign the conceptual model of git for someone who has never used version control.
      Don't redesign the UI. Redesign what the user has to believe about reality
      in order for their actions to make sense. Be concrete about what stays and what goes.

  - id: board-vs-video-games
    prompt: |
      Why do board games feel structurally different from video games at a phenomenological level?
      Not "screens vs cardboard" -- what's load-bearing about the experience of one
      that the other can't replicate even in principle?

  - id: open-source-load-bearing
    prompt: |
      Name three load-bearing assumptions about modern open-source culture that, if false,
      would change strategic decisions substantially. For each, name who would benefit
      from it being false.

  - id: shallow-fluency
    prompt: |
      Describe a failure mode that emerges only when AI assistants become conversationally
      fluent but cognitively shallow. Be specific about what breaks and for whom.
      Don't list five failure modes -- pick one and follow it down.

  - id: attention-as-moral
    prompt: |
      What's the strongest argument that paying attention is itself a moral act?
      Not "attention enables moral action" -- attention itself, as a category of behavior.
      Whose tradition does this argument come from?
