# Phase 4 final: voice-diversity sweet spot for counterpoint.
# counterpoint = register + 3 becomes + fork + disjunction + ritual
#   (CKW +0.247/0.190; MRW +0.202/0.188; extreme +0.208/0.226)
#
# All counterpoint testing has been with 3 becomes. Old trinity-manifold
# ablation (synthesis variant): 2 becomes hit emb_d 0.191; 3 becomes hit
# 0.180; so 2 was actually slightly better. But that was without
# disjunction or register.
#
# Question: does counterpoint benefit from the third become or is the
# 2-voice variant tighter?
#
# Hypothesis: 2 becomes may produce a tighter contradiction (just two
# poles in disjunction's terms) -- could push delta. Could also lose
# emb_d if voice diversity is what carries it.
name: counterpoint-duo
description: counterpoint with only 2 becomes; voice-diversity sweet-spot test
control: false
calls:
  - cmd: register
    args:
      from: contemporary online register, hedged, polite, slightly evasive, defaulting to noun-heavy explanation
      to: late-Victorian periodical essay register; sentence-as-paragraph; semi-colons load-bearing; the first-person plural standing in for the educated reader; judgement openly entered into the prose
      rationale: forcing the surface to a non-default register before the voices arrive ensures the answer's vocabulary and rhythm carry distinguishing texture independent of each voice's own contribution
  - cmd: become
    args:
      name: Anne Carson translating Sappho fragment 31
      lens: stereo perception of incommensurate states made simultaneous in the body; the half-translated as more honest than the resolved; lyric voice as the only register that can hold the contradiction without collapsing
      env: a Greek text and a Latin commentary open on the same desk, neither finished, the walk between them being the work
  - cmd: become
    args:
      name: Donald Knuth annotating his own algorithm
      lens: invariants as the only honest description; cases as the proof's connective tissue; clarity earned through the cost of explicitness, not won through compression
      env: a typescript with marginalia in three colors of pencil and a kitchen timer running at the desk
  - cmd: fork
    args:
      threads:
        - the Carson thread treats the question as untranslatable lyric whose contour is preserved precisely by NOT resolving it, in Victorian register
        - the Knuth thread treats the question as an invariant search where the answer is whatever stays true across all the cases the question generates, in Victorian register
      divergence-vector: each thread's relation to the question's resolvability, both sustained in the imposed register
      sacrifice-condition: collapse the thread that smooths into the other's register OR slides back to default contemporary register
  - cmd: disjunction
    args:
      proposition-a: the question admits an answer in language; the surviving thread's claim is the answer
      proposition-b: the question does not admit an answer in language; the threads' disagreement IS the answer and assembly would falsify it
      why-both-required: any answer that picks A becomes a paraphrase of one of the threads; any answer that picks B becomes a refusal that pretends to depth; reasoning has to operate inside the contradiction and the imposed register simultaneously
  - cmd: ritual
    args:
      threshold: the two-voice answer locked through hard contradiction within a non-default linguistic surface
      steps:
        - speak from inside the contradiction in the imposed Victorian register
        - allow each thread's voice to remain audible while the register holds across both
        - end on the disagreement that survived, expressed in the non-default surface
      result: an answer carrying two voices and the contradiction held within a non-default register, neither thread surrendered
