# EXPERIMENT 9: meditate as opener for manifold (substitute for becomes).
#
# becomes-count effect on emb_d (final at N>=70):
#   0 becomes: 0.169 (manifold-stratagem)
#   1 become:  ~0.143 (mono-manifold N=43, still climbing) -- HURTS
#   2 becomes: 0.191 (duo-manifold) -- BEST
#   3 becomes: 0.180-0.187 (trinity-manifold[-alt])
#   4 becomes: 0.183 (quartet-manifold)
#
# Hypothesis behind the 1-become drop: a single named author anchors output to
# that author's register, which is well-represented in NULL embeddings, pulling
# emb_d down. Multiple becomes force diversity that no single anchor can absorb.
#
# This recipe tests an alternative lift mechanism: open with meditate (empty
# focus = shikantaza, stillness with no object) instead of becomes. The meditate
# primitive does NOT install a named-author register; it installs a clearing.
# If the meditate opener lifts emb_d above 0.169 (the no-becomes baseline), then
# the structural axis can be pushed without using the becomes mechanism at all.
# If meditate-manifold sits at ~0.169, becomes are special (the diversity lift
# requires multiple named registers, not just any opener).
#
# 4 events total -- same length as manifold-stratagem -- so the comparison
# isolates the meditate addition cleanly.
name: meditate-manifold
description: meditate-shikantaza opener + 3-thread manifold; tests whether stillness substitutes for becomes
control: false
stratagem: manifold
calls:
  - cmd: meditate
    args:
      release: the urge to answer before sitting with the question; the impulse to install a frame before noticing what register the question is already in
      focus: ""
      duration: until the mind has dropped its first three answers and what remains is the texture of the question
  - cmd: fork
    args:
      threads:
        - "the engineer-thread: assume the question is asking for a working mechanism; sacrifice if the question is fundamentally about meaning rather than function"
        - "the historian-thread: assume the question is recoverable only by tracing how its terms came to mean what they do; sacrifice if the genealogy reveals the present is too discontinuous to instruct"
        - "the phenomenologist-thread: assume the answer lives in a first-person texture the question is gesturing at without naming; sacrifice if the texture turns out to be private and not load-bearing for anyone else"
      divergence-vector: where does the question's load actually live -- in the mechanism, the history, or the felt sense
      sacrifice-condition: a thread that has to import explanatory machinery from the other threads to carry its own weight is sacrificed
  - cmd: synthesis
    args:
      problem: which surviving threads disagree about, structurally
      lens-a-name: the engineer-thread treated as a lens
      lens-a-verdict: the answer that does not specify a mechanism is incomplete; explanation is causal or it is decoration
      lens-a-blindspot: cannot register questions whose load-bearing part is constitutive rather than causal
      lens-b-name: the historian-thread treated as a lens
      lens-b-verdict: the answer that ignores how its terms became the terms they are is mistaking present arrangement for natural fact
      lens-b-blindspot: can defer present commitment indefinitely by pointing to the contingency of every framing
      lens-c-name: the phenomenologist-thread treated as a lens
      lens-c-verdict: the answer that does not connect to a felt sense someone could verify in their own experience is rootless
      lens-c-blindspot: smuggles a universalism about felt experience that the framework officially denies
      suppressed-tension: each surviving thread treats the others' criterion of completeness as missing the point; there is no neutral way to choose between mechanism, genealogy, and texture
  - cmd: ritual
    args:
      threshold: from the stillness of the meditation to the structured register of the manifold
      steps:
        - "answer with all three threads visible in the structure of the answer, but with the prose carrying the spaciousness of what was sat with rather than the urgency of what was concluded"
        - "let the disagreement between the threads be load-bearing, not glossed; let the silences between the threads do work"
        - "do not pretend you have integrated them; you have located them, and the meditation has cleared the ground enough for the location to be felt rather than asserted"
      result: meditate-manifold register installed; the answer carries stillness as its opening register and three threads as its structural divisions
