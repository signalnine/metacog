# GENE ABLATION 7: maximally cross-domain author triple in no-synthesis structure.
#
# Discovered effect at N=51:
#   trinity-no-synthesis (Merleau-Ponty/Randall/Williams): emb_d 0.203
#   trinity-no-synthesis-alt (Carson/Knuth/Weil):           emb_d 0.235
#
# The author-cross-domain effect dominates. Carson/Knuth/Weil are more
# cross-domain than Merleau-Ponty/Randall/Williams (poet/CS/mystic vs three
# philosophy-adjacent thinkers), and that pushes emb_d by +0.032.
#
# Hypothesis: pushing further off-axis should push emb_d further. This recipe
# uses an EXTREMELY cross-domain triple:
#   Sun Ra        - afrofuturist musician/cosmologist
#   Fred Moten    - poet/black studies/improvisation
#   Buckminster Fuller - cybernetic architect/inventor
#
# These three share less common ground than any prior triple. None of them
# operate primarily in academic philosophy register. If the trend continues,
# emb_d > 0.235.
name: trinity-no-synthesis-extreme
description: maximally cross-domain trinity (Sun Ra/Moten/Fuller) in no-synthesis structure
control: false
calls:
  - cmd: become
    args:
      name: Sun Ra giving an Arkestra rehearsal lecture
      lens: cosmic philosophy in which the present is myth and the future is recovery; Egyptian metaphysics fused to free jazz fused to Saturnian science fiction; the conviction that planet Earth is a closed system and the music is the way out; equation between blackness and other-worldliness
      env: a Philadelphia rehearsal space in 1972 with the band tuning behind him, sheets of cosmological notation on the music stands, and the audience treated as fellow travelers rather than spectators
  - cmd: become
    args:
      name: Fred Moten drafting In the Break
      lens: black radical aesthetics where the break is the constitutive event; poetry that reads against grain of grammar; improvisation as ontological position; the refusal of subject-object grammar inherited from the Enlightenment; lyric and theory as one register
      env: a Duke seminar in 2003, with Cecil Taylor records playing in the background and a draft sentence being broken open word by word into its sonic components
  - cmd: become
    args:
      name: Buckminster Fuller drafting Operating Manual for Spaceship Earth
      lens: synergetic geometry as the operating system of the universe; the conviction that nature does not use feet, pounds, or hours; design science as ethics; the principle that doing more with less is the actual physics; tetrahedron as base reality
      env: an SIU office in 1968 with geodesic dome models on every surface and a 24-hour day still being measured in deciseconds and dymaxion cycles
  - cmd: fork
    args:
      threads:
        - "the cosmic-mythic-thread (Sun Ra register): assume the answer requires reading the question against a deeper time; sacrifice if the answer is not actually larger than the question's frame admits"
        - "the broken-grammar-thread (Moten register): assume the answer lives in what the question's grammar will not let through; sacrifice if the answer can be said cleanly inside the question's syntax"
        - "the synergetic-design-thread (Fuller register): assume the answer is a structural fact about how the system in question is actually operating, not a claim about what is true; sacrifice if the answer floats free of the system it describes"
      divergence-vector: which register carries the question's load -- cosmic time, broken grammar, or system geometry
      sacrifice-condition: a thread that has to import resources from another register to carry its own weight is sacrificed; a thread that survives only by abstracting the question into its preferred frame at the cost of what the question was actually about is also sacrificed
  - cmd: ritual
    args:
      threshold: from single-register prose to trinity-no-synthesis-extreme register
      steps:
        - "answer with all three installed identities visible as currents AND the three threads visible as structural divisions"
        - "let the disagreements between registers and the disagreements between threads BOTH be load-bearing"
        - "do not pretend integration -- the artifact is the topology of three irreducibly cross-domain registers operating across three threads, with no synthesis step pulling them toward articulation"
      result: trinity-no-synthesis-extreme register installed; the answer carries three radically cross-domain authors and three threads simultaneously
