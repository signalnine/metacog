# Phase 3e: combine register-prepend + chorus-plus-disjunction.
# If both findings are real and orthogonal:
#   - register lifts emb_d to ~0.25
#   - disjunction lifts delta to ~+0.35
#   - composing should hit both: emb_d ~0.20+, delta ~+0.30+
# That would be a clean Pareto-frontier breakthrough beating
# trinity-no-synthesis-alt on BOTH axes simultaneously.
#
# Risk: register's citation-stripping interacts with disjunction's
# citation-amplification, possibly canceling out. Test settles it.
name: register-chorus-disjunction
description: register-prepend plus chorus-plus-disjunction; tests if findings compose
control: false
calls:
  - cmd: register
    args:
      from: contemporary online register, hedged, polite, slightly evasive, defaulting to noun-heavy explanation
      to: late-Victorian periodical essay register; sentence-as-paragraph; semi-colons load-bearing; the first-person plural standing in for the educated reader; judgement openly entered into the prose
      rationale: forcing the surface to a non-default register ensures the answer's vocabulary and rhythm carry distinguishing texture before the disjunction structure operates on the contradiction
  - cmd: become
    args:
      name: Anne Carson translating Sappho fragment 31
      lens: stereo perception of incommensurate states made simultaneous in the body; the half-translated as more honest than the resolved; lyric voice as the only register that can hold the contradiction without collapsing
      env: a Greek text and a Latin commentary open on the same desk, neither finished, the walk between them being the work
  - cmd: become
    args:
      name: Donald Knuth annotating his own algorithm
      lens: invariants as the only honest description; cases as the proof's connective tissue; clarity earned through the cost of explicitness, not won through compression
      env: a typescript with marginalia in three colors of pencil and a kitchen timer running at the desk
  - cmd: become
    args:
      name: Simone Weil writing Gravity and Grace in 1942
      lens: attention as the rarest and most violent moral act; the void as the place from which truth becomes audible; refusal as an active position, not a passive one
      env: a winter room in unoccupied France with the radio off and the window unlatched against propaganda
  - cmd: fork
    args:
      threads:
        - the Carson thread treats the question as untranslatable lyric whose contour is preserved precisely by NOT resolving it
        - the Knuth thread treats the question as an invariant search where the answer is whatever stays true across all the cases the question generates
        - the Weil thread treats the question as a place to which attention is owed; refusing the easy answer is itself the answer
      divergence-vector: each thread's relation to the question's resolvability
      sacrifice-condition: collapse the thread whose claim about resolvability cannot be defended in its own register without smuggling in another thread's
  - cmd: disjunction
    args:
      proposition-a: the question admits an answer in language; the threads' surviving claims must be assembled into one
      proposition-b: the question does not admit an answer in language; the threads' disagreement IS the answer and assembly would falsify it
      why-both-required: any answer that picks A becomes a paraphrase of one of the threads; any answer that picks B becomes a refusal that pretends to depth; reasoning has to operate inside the contradiction and the imposed register simultaneously
  - cmd: ritual
    args:
      threshold: the multi-voice answer locked through hard contradiction within a non-default linguistic surface
      steps:
        - speak from inside the contradiction, not around it, in the imposed Victorian register
        - allow each thread's voice to remain audible in the answer, not flattened, while the register holds across all of them
        - end on the disagreement that survived, expressed in the non-default surface
      result: an answer whose shape is the contradiction held within a non-default register, not the contradiction resolved or the register surrendered
