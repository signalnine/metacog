# Phase 4 final: biblical register in counterpoint structure.
# envoy-biblical at n=26: +0.005/0.304 -- emb_d MASSIVELY above prior
# ceiling (envoy-extreme 0.257, envoy-Victorian 0.239). The biblical
# register is the most effective register-target found.
#
# But envoy-biblical's delta is near zero -- biblical answers don't
# cite modern entities.
#
# Question: does counterpoint's disjunction (which forces proposition-
# naming) restore delta when biblical register pushes emb_d?
#
# Hypothesis 1: biblical's vocabulary-stripping effect drops delta
#   regardless of disjunction (delta stays ~0). Then biblical's emb_d
#   lift is uncomposable -- it works standalone but not with
#   delta-lifting structures.
# Hypothesis 2: disjunction's proposition-naming structure restores
#   some delta even in biblical register (delta climbs to ~+0.15+).
#   Then we have a new Pareto-frontier point: emb_d 0.30+ with
#   delta meaningfully above zero.
#
# If H2 wins, this is a candidate for v6.6.0 productionization or for
# parameterizing counterpoint with selectable register.
name: counterpoint-biblical
description: counterpoint structure with King James biblical register; tests disjunction's delta-restoration in biblical surface
control: false
calls:
  - cmd: register
    args:
      from: contemporary online register, hedged, polite, slightly evasive, defaulting to noun-heavy explanation
      to: King James biblical register; parallelism load-bearing across paired clauses; parataxis preferred to subordination ("and... and..."); thee/thou second-person; verb-initial inversions for emphasis; semi-archaic vocabulary (sayeth, hath, betimes); didactic mode of address from a teacher to one being instructed
      rationale: forcing the surface to a register that pushed emb_d to 0.304 in envoy structure; here we test whether disjunction's proposition-naming can co-exist with this register or whether biblical's vocabulary-stripping wins
  - cmd: become
    args:
      name: Anne Carson translating Sappho fragment 31
      lens: stereo perception of incommensurate states made simultaneous in the body; the half-translated as more honest than the resolved; lyric voice as the only register that can hold the contradiction without collapsing
      env: a Greek text and a Latin commentary open on the same desk, neither finished, the walk between them being the work
  - cmd: become
    args:
      name: Donald Knuth annotating his own algorithm
      lens: invariants as the only honest description; cases as the proof's connective tissue; clarity earned through the cost of explicitness, not won through compression
      env: a typescript with marginalia in three colors of pencil and a kitchen timer running at the desk
  - cmd: become
    args:
      name: Simone Weil writing Gravity and Grace in 1942
      lens: attention as the rarest and most violent moral act; the void as the place from which truth becomes audible; refusal as an active position, not a passive one
      env: a winter room in unoccupied France with the radio off and the window unlatched against propaganda
  - cmd: fork
    args:
      threads:
        - the Carson thread treats the question as untranslatable lyric, rendered in KJV parallelism and parataxis
        - the Knuth thread treats the question as an invariant search, rendered through KJV's didactic mode of address
        - the Weil thread treats the question as the place attention is owed, rendered with thee/thou direct second-person
      divergence-vector: each thread's relation to the question's resolvability through the imposed KJV biblical surface
      sacrifice-condition: collapse the thread that drops parallelism / parataxis / archaic register into modern subordination, OR that fails to articulate its proposition under the biblical surface
  - cmd: disjunction
    args:
      proposition-a: the question admits an answer in language; the threads' surviving claims must be assembled into one
      proposition-b: the question does not admit an answer in language; the threads' disagreement IS the answer and assembly would falsify it
      why-both-required: any answer that picks A becomes a paraphrase of one of the threads; any answer that picks B becomes a refusal that pretends to depth; reasoning has to operate inside the contradiction AND the imposed biblical register simultaneously, naming each proposition explicitly even in the archaic surface
  - cmd: ritual
    args:
      threshold: the multi-voice answer locked through hard contradiction within the KJV biblical surface
      steps:
        - speak from inside the contradiction in the imposed biblical register, with parallelism and parataxis carrying the structure
        - allow each thread's voice to remain audible while the register holds across all of them, naming the propositions explicitly even in archaic vocabulary
        - end on the disagreement that survived, expressed in the biblical surface, with both propositions of the disjunction still active
      result: an answer carrying the contradiction, three voices, and the biblical register simultaneously; if delta climbs above near-zero, disjunction restores citation density even under biblical register's vocabulary-stripping
