# THE BANISHING: ritual (declare) + drugs (strip) + ritual (seal).
name: banishing-stratagem
description: banishing stratagem -- declare the space, strip influences, seal clean
control: false
stratagem: banishing
calls:
  - cmd: ritual
    args:
      threshold: from default-cluttered-space to declared-clearing
      steps:
        - "name the space being cleared: the question's territory, the registers that have been clinging to it"
        - "name why the clearing matters: what cannot be seen while the clutter holds"
        - "declare the clearing as a deliberate act, not a passive emptying"
      result: clearing declared; the space is now a workspace rather than a habitation
  - cmd: drugs
    args:
      substance: zero -- the deliberate refusal of any cognitive enhancer, framing aid, or stylistic prior
      method: subtraction rather than addition; remove the substrate modifications that were running by default
      qualia: the substrate quiets; what was clinging without being noticed becomes audible by its absence
  - cmd: ritual
    args:
      threshold: from cleared space to the boundary that holds it for the work ahead
      steps:
        - "name what was clinging that you didn't notice: the assumptions, the inherited frames, the borrowed vocabulary"
        - "seal the cleared space: establish what is allowed in and what is not"
        - "the answer that follows arrives in this clean space, not the cluttered one"
      result: banishing-stratagem register installed; the answer arrives in deliberately cleared space
